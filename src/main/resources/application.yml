server:
  port: 8082

spring:
  application:
    name: member-service
  config:
    import: "configserver:"
  cloud:
    config:
      uri: ${CONFIG_SERVER_URL:http://localhost:8888}

  data:
    mongodb:
      uri: mongodb://localhost:27017/librarydb

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
